$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Section
description: 'Sección contenedora con contenido (usado por el paragraph type Section).'
group: Layout

libraryOverrides:
  dependencies:
    - puzz/section

props:
  type: object
  properties:
    content:
      type: object
      title: Content
      description: Render array o contenido renderizable de la sección.
      examples:
        - {}
    label_display:
      type: string
      title: Label display
      description: Posición del label del campo (above, below, hidden).
      enum: [ above, below, hidden ]
      default: hidden
    label_text:
      type: string
      title: Label text
      description: Texto del label (desde Manage display).
