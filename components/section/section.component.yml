$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Section
description: 'Sección contenedora con contenido (usado por el paragraph type Section).'
group: Layout

# La librería puzz/section se registra en hook_library_info_alter() y apunta a build/components/section/
# Incluimos puzz/background_image porque el section suele contener ese componente y su HTML se pre-renderiza (las librerías de los hijos no se adjuntan).
libraryOverrides:
  dependencies:
    - puzz/section
    - puzz/background_image

props:
  type: object
  properties:
    content:
      type: string
      title: Content
      description: Contenido HTML de la sección (p. ej. cuerpo del párrafo).
      examples:
        - '<p>Contenido de la sección.</p>'
    label_display:
      type: string
      title: Label display
      description: Posición del label del campo (above, below, hidden).
      enum: [ above, below, hidden ]
      default: hidden
    label_text:
      type: string
      title: Label text
      description: Texto del label (desde Manage display).
