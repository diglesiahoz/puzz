$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Checkbox Group
description: Group of checkbox controls with legend, help and error states.
group: Forms

libraryOverrides:
  dependencies:
    - puzz/checkbox-group

props:
  type: object
  properties:
    legend:
      type: string
    name:
      type: string
    options:
      type: array
    children:
      type: object
    required:
      type: boolean
      default: false
    disabled:
      type: boolean
      default: false
    help:
      type: string
    error:
      type: string
